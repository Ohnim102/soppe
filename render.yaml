services:
  - type: web
    name: convertlink
    runtime: node
    plan: free
    buildCommand: npm install --include=dev --include=optional && npm install --workspace frontend --include=optional --no-save typescript@5.6.3 vite@6.4.3 @types/node@22.20.0 @types/react@19.2.17 @types/react-dom@19.2.3 @rollup/rollup-linux-x64-gnu@4.62.2 lightningcss-linux-x64-gnu@1.32.0 @tailwindcss/oxide-linux-x64-gnu@4.3.1 && npm run build && npm prune --omit=dev
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: VITE_API_BASE_URL
        value: ""
      - key: SHOPEE_AFFILIATE_ID
        sync: false
      - key: SHOPEE_SUB_ID
        sync: false
      - key: SHOPEE_AFFILIATE_DASHBOARD
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: LOG_LEVEL
        value: info
      - key: LOG_PRETTY
        value: "false"
      - key: LOG_IP
        value: "false"
      - key: LOG_FILE
        value: ""
